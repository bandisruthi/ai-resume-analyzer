<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        select, input, button {
            margin-top: 10px;
            padding: 10px;
            width: 90%;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 AI Resume Analyzer</h2>

    <form method="POST" enctype="multipart/form-data">

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="software_engineer">Software Engineer</option>
            <option value="web_developer">Web Developer</option>
            <option value="data_analyst">Data Analyst</option>
            <option value="aiml_engineer">AI/ML Engineer</option>
        </select>

        <input type="file" name="resume" required>

        <button type="submit">Analyze Resume</button>
    </form>
</div>

</body>
</html>
